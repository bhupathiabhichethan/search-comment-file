<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            background-color: aquamarine;
        }
        #div1{
            display: none;
        }
        #div2{
            visibility: hidden;
        }
        #div3{
            width: 50px;
            height: 50px;
            opacity: 0;
            cursor:pointer;
        }
    </style>
</head>
<body>
    <div id="div1">ONE</div>
    <div id="div2">TWO</div>
    <div id="div3">THREE</div>
</body>
</html>
