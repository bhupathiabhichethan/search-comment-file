<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       body{
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: Arial, sans-serif;
        color: rgb(136, 11, 11);
        text-align: center;
       }
    .background{
        background: url("images/Drona-Mountain-Lake-House-Sunrise-Scenery-Wallpaper-Mural-710x450.jpg");
        background-size: cover;
        height: 100vh;
        display: flex; 
        flex-direction: column;
        justify-content: center;
    }
    .content {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        height: 90%;

    }
    header h1{
        margin: 20px;
        font-size: 24px;
        text-align: left;
        padding-left: 20px;
        font-weight: bolder;
    }
    main{
        display: flex;
        justify-content: row;

    }
    main h1{
        font-weight: bolder;
    }
    main hr{
    width: 10%;
    border:1px solid white;
    }
    main p{
        font-size: 18px;
        margin: 0px;
    }
    footer{
        margin-bottom: 20px;
    }
    footer p {
        font-size: 14px;
    }
    </style>
</head>
<body>
    <div class="background">
        <div class="content">
            <header>
                <h1>Logo</h1>
                <p>cart</p>
            </header>
            <main>
                <h1>COMING SOON</h1>
                <hr>
                <p>35 days left</p>
            </main>
            <footer>
                <p>Powered by <a href="https://www.w3schools.com/w3css/">w3.css</a></p>
            </footer>
        </div>
    </div>
</body>
</html>
