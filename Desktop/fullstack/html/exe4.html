<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        /* Set the background image and styling */
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: Arial, sans-serif;
    color: white;
    justify-content: center;
    text-align: center;
}

.background {
    background: url('https://www.w3schools.com/w3images/forestbridge.jpg') no-repeat center center fixed;
    background-size:cover;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.content {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 90%;
}

/* Header (Logo) styling */
header h1 {
    margin: 20px;
    font-size: 24px;
    text-align: left;
    padding-left: 20px;
    font-weight: normal;
}

/* Main content styling */
main h1 {
    font-size: 50px;
    margin: 0;
}

main hr {
    width: 10%;
    margin: 10px auto;
    border: 1px solid white;
}

main p {
    font-size: 18px;
    margin: 10px 0;
}

/* Footer styling */
footer {
    margin-bottom: 20px;
}

footer p {
    font-size: 14px;
}

footer a {
    color: white;
    text-decoration: none;
}

footer a:hover {
    text-decoration: underline;
}

    </style>
</head>
<body>
    <div class="background">
        <div class="content">
            <header>
                <h1>Logo</h1>
            </header>
            <main>
                <h1>COMING SOON</h1>
                <hr>
                <p>35 days left</p>
            </main>
            <footer>
                <p>Powered by <a href="https://www.w3schools.com/w3css/">w3.css</a></p>
            </footer>
        </div>
    </div>
</body>
</html>
